version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vozve_postgres
    environment:
      POSTGRES_USER: vozve_user
      POSTGRES_PASSWORD: vozve_secure_password_123
      POSTGRES_DB: vozve_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vozve_network

  redis:
    image: redis:7-alpine
    container_name: vozve_redis
    ports:
      - "6379:6379"
    networks:
      - vozve_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vozve_backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://vozve_user:vozve_secure_password_123@postgres:5432/vozve_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_key_here
      API_PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - vozve_network
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:

networks:
  vozve_network:
    driver: bridge
